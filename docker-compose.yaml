services:
  openviking:
    build: .
    ports:
      - "10.200.0.1:1933:1933"
    volumes:
      - openviking-data:/app/data
    environment:
      - OV_EMBED_PROVIDER=${OV_EMBED_PROVIDER}
      - OV_EMBED_API_BASE=${OV_EMBED_API_BASE}
      - OV_EMBED_API_KEY=${OV_EMBED_API_KEY}
      - OV_EMBED_MODEL=${OV_EMBED_MODEL}
      - OV_EMBED_DIMENSION=${OV_EMBED_DIMENSION}
      - OV_VLM_PROVIDER=${OV_VLM_PROVIDER}
      - OV_VLM_API_BASE=${OV_VLM_API_BASE}
      - OV_VLM_API_KEY=${OV_VLM_API_KEY}
      - OV_VLM_MODEL=${OV_VLM_MODEL}

volumes:
  openviking-data:
